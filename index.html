<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevHub - Clean Version</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #0d6efd; --success-color: #198754; --warning-color: #ffc107; }
        body { background-color: #f0f2f5; font-family: 'Kanit', sans-serif; padding-bottom: 90px; }
        
        .header-box { background: linear-gradient(135deg, #0d6efd, #00429d); color: white; padding: 35px 15px; border-radius: 0 0 30px 30px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-link { text-align: center; color: #999; text-decoration: none; font-size: 11px; flex: 1; border: none; background: none; transition: 0.2s; }
        .nav-link.active { color: var(--primary-color); font-weight: 600; transform: translateY(-3px); }
        .nav-link i { font-size: 24px; display: block; margin-bottom: 2px; }

        .card-custom { border: none; border-radius: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; background: white; transition: transform 0.2s ease; cursor: pointer; border: 1px solid transparent; }
        .card-custom:active { transform: scale(0.97); }
        
        .border-exp { border-left: 5px solid var(--warning-color) !important; }
        .border-job { border-left: 5px solid var(--success-color) !important; }
        
        .btn-action { border-radius: 50px; font-weight: 600; padding: 10px 20px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="page1" class="page active-page">
    <div class="header-box text-center">
        <h4 class="fw-bold mb-1"><i class="bi bi-chat-quote-fill me-2"></i>สังคมเดฟ</h4>
        <small class="opacity-75">แลกเปลี่ยนไอเดียและพูดคุย</small>
    </div>
    <div class="container mb-4 text-center">
        <button class="btn btn-light w-100 btn-action text-primary border" data-bs-toggle="modal" data-bs-target="#modal1">
            <i class="bi bi-pencil-square me-2"></i> เขียนโพสต์ใหม่
        </button>
    </div>
    <div id="list1" class="container"></div>
</div>

<div id="page2" class="page">
    <div class="header-box text-center">
        <h4 class="fw-bold mb-1"><i class="bi bi-bar-chart-line-fill me-2"></i>อันดับเว็บไซต์</h4>
        <small class="opacity-75">เรียงตามคะแนนความนิยม</small>
    </div>
    <div id="list2" class="container"></div>
</div>

<div id="page3" class="page">
    <div class="header-box text-center">
        <h4 class="fw-bold mb-1"><i class="bi bi-lightbulb-fill me-2"></i>ประสบการณ์</h4>
        <small class="opacity-75">แชร์ความรู้จากเหล่า Dev</small>
    </div>
    <div class="container mb-4 text-center">
        <button class="btn btn-warning text-white w-100 btn-action" data-bs-toggle="modal" data-bs-target="#modal3">
            <i class="bi bi-stars me-2"></i> แชร์ประสบการณ์
        </button>
    </div>
    <div id="list3" class="container"></div>
</div>

<div id="page4" class="page">
    <div class="header-box text-center" style="background: linear-gradient(135deg, #198754, #0a4d2e);">
        <h4 class="fw-bold mb-1"><i class="bi bi-briefcase-fill me-2"></i>จ้างงานด่วน</h4>
        <small class="opacity-75">หาคนทำงาน หรือหางานที่ใช่</small>
    </div>
    <div class="container mb-4 text-center">
        <button class="btn btn-success w-100 btn-action" data-bs-toggle="modal" data-bs-target="#modal4">
            <i class="bi bi-plus-circle me-2"></i> ลงประกาศงาน
        </button>
    </div>
    <div id="list4" class="container"></div>
</div>

<nav class="bottom-nav">
    <button class="nav-link active" onclick="showPage('page1', this)"><i class="bi bi-chat-dots-fill"></i>สังคม</button>
    <button class="nav-link" onclick="showPage('page2', this)"><i class="bi bi-list-ol"></i>อันดับ</button>
    <button class="nav-link" onclick="showPage('page3', this)"><i class="bi bi-journal-text"></i>ความรู้</button>
    <button class="nav-link" onclick="showPage('page4', this)"><i class="bi bi-person-workspace"></i>จ้างงาน</button>
</nav>

<div class="modal fade" id="modal1" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body p-0"><iframe src="https://docs.google.com/forms/d/e/1FAIpQLScGfD3kDVJaCqZmvnTt6jpJMKY2xJrJU2WBuIOIt8WeiGPGww/viewform?embedded=true" width="100%" height="600" frameborder="0"></iframe></div></div></div></div>
<div class="modal fade" id="modal3" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body p-0"><iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdIFyA_JmeF20s3VX_qGIW6S1-g9RWHk_BLWCjfENwTeUzIeQ/viewform?embedded=true" width="100%" height="600" frameborder="0"></iframe></div></div></div></div>
<div class="modal fade" id="modal4" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body p-0"><iframe src="https://docs.google.com/forms/d/e/1FAIpQLScGfD3kDVJaCqZmvnTt6jpJMKY2xJrJU2WBuIOIt8WeiGPGww/viewform?embedded=true" width="100%" height="600" frameborder="0"></iframe></div></div></div></div>

<script>
    // IDs เรียงตามที่คุณส่งมา (1:สังคม, 2:อันดับ, 3:ประสบการณ์, 4:จ้างงาน)
    const IDS = {
        S1: '15ajcag5w0OlLohaLHt7nY3NT3mkR_jDuc8hV3UKFeVY',
        S2: '1ocXnPIi2fvjYxkO-GOVBZpm-RBg122_ywP_IJcv3Bi8',
        S3: '1FZfgrRFicbs0XpRZZ0WBBSZ6dfWsPf1_IpYFht2e5KU',
        S4: '1xnYqk5zr4WInc2BKMfMhbTYd9GTEcgrjsAsMJeh30jg'
    };

    function showPage(pId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pId).classList.add('active-page');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(pId === 'page1') load1();
        if(pId === 'page2') load2();
        if(pId === 'page3') load3();
        if(pId === 'page4') load4();
    }

    async function pull(id) {
        try {
            const r = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&gid=0`);
            const t = await r.text();
            return JSON.parse(t.substring(47).slice(0, -2)).table.rows;
        } catch (e) { return []; }
    }

    async function load1() {
        const rows = await pull(IDS.S1);
        let h = '';
        rows.forEach(r => {
            h += `<div class="card card-custom p-3"><div class="d-flex align-items-center mb-2"><div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width:35px;height:35px">${(r.c[2]?.v || 'A').charAt(0)}</div><div class="ms-2 fw-bold text-dark">${r.c[2]?.v || 'Anonymous'}</div></div><p class="small text-secondary mb-0">${r.c[4]?.v || ''}</p></div>`;
        });
        document.getElementById('list1').innerHTML = h || '<p class="text-center">กำลังโหลด...</p>';
    }

    async function load2() {
        const rows = await pull(IDS.S2);
        // เรียงคะแนนจากคอลัมน์ E (index 4) มากไปน้อย
        rows.sort((a, b) => (parseFloat(b.c[4]?.v) || 0) - (parseFloat(a.c[4]?.v) || 0));
        let h = '';
        rows.forEach((r, i) => {
            h += `<div class="card card-custom p-3 d-flex flex-row justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <div class="fw-bold text-primary me-3 fs-5" style="min-width:40px;">#${i+1}</div>
                    <div><h6 class="fw-bold mb-0 text-dark">${r.c[1]?.v || ''}</h6><small class="text-muted">${r.c[2]?.v || ''}</small></div>
                </div>
                <div class="text-end">
                    <div class="text-warning fw-bold"><i class="bi bi-star-fill"></i> ${r.c[4]?.v || '0.0'}</div>
                    <a href="${r.c[3]?.v}" target="_blank" class="btn btn-sm btn-link p-0 text-decoration-none" style="font-size:11px">ลิ้งก์เว็บ <i class="bi bi-arrow-right"></i></a>
                </div>
            </div>`;
        });
        document.getElementById('list2').innerHTML = h;
    }

    async function load3() {
        const rows = await pull(IDS.S3);
        let h = '';
        rows.forEach(r => {
            h += `<div class="card card-custom p-3 border-exp"><h6 class="fw-bold text-dark mb-1">${r.c[1]?.v || ''}</h6><p class="small text-muted mb-0">${r.c[2]?.v || ''}</p></div>`;
        });
        document.getElementById('list3').innerHTML = h;
    }

    async function load4() {
        const rows = await pull(IDS.S4);
        let h = '';
        rows.forEach(r => {
            h += `<div class="card card-custom p-3 border-job">
                <div class="d-flex justify-content-between align-items-start mb-2"><h6 class="fw-bold text-success mb-0">${r.c[3]?.v || 'Job'}</h6><span class="badge bg-success">฿ ${r.c[5]?.v || '0'}</span></div>
                <p class="small text-muted mb-3">${r.c[4]?.v || ''}</p>
                <div class="text-end"><a href="${r.c[6]?.v || '#'}" target="_blank" class="btn btn-sm btn-primary rounded-pill px-4">ดูงาน</a></div>
            </div>`;
        });
        document.getElementById('list4').innerHTML = h;
    }

    window.onload = load1;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
