<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comprocodeing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --blue: #0d6efd; --purple: #6610f2; --gold: #ffc107; --green: #198754; }
        body { background-color: #f4f6f9; font-family: sans-serif; padding-bottom: 80px; margin: 0; }
        
        /* Header Colors */
        .header-box { color: white; padding: 25px 15px; border-radius: 0 0 20px 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .bg-p1 { background: linear-gradient(135deg, var(--blue), #004fb0); }
        .bg-p2 { background: linear-gradient(135deg, var(--purple), #4b0db8); }
        .bg-p3 { background: linear-gradient(135deg, var(--gold), #e0a800); }
        .bg-p4 { background: linear-gradient(135deg, var(--green), #11663f); }

        /* Card Styles */
        .card-custom { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .t-title { font-size: 17px; font-weight: bold; color: #333; }
        .t-desc { font-size: 14px; color: #444; line-height: 1.5; display: block; margin-top: 5px; }
        .img-preview { width: 100%; max-height: 300px; object-fit: contain; border-radius: 8px; margin-top: 10px; background: #fafafa; border: 1px solid #eee; }

        /* Nav & Page Control */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 65px; z-index: 999; }
        .nav-btn { flex: 1; border: none; background: none; color: #888; font-size: 11px; padding-top: 8px; }
        .nav-btn.active { color: var(--blue); font-weight: bold; }
        .nav-btn i { font-size: 22px; display: block; }
        .page { display: none; } .active-page { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="p1" class="page active-page">
    <div class="header-box bg-p1"><h4><i class="bi bi-chat-heart"></i> สังคมเดฟ</h4></div>
    <div class="container mb-3"><button class="btn btn-primary w-100 rounded-pill" data-bs-toggle="modal" data-bs-target="#m1">โพสต์ใหม่</button></div>
    <div id="l1" class="container"></div>
</div>

<div id="p2" class="page">
    <div class="header-box bg-p2"><h4><i class="bi bi-trophy"></i> อันดับเว็บไซต์</h4></div>
    <div id="l2" class="container"></div>
</div>

<div id="p3" class="page">
    <div class="header-box bg-p3"><h4><i class="bi bi-lightbulb"></i> ความรู้</h4></div>
    <div class="container mb-3"><button class="btn btn-warning text-white w-100 rounded-pill" data-bs-toggle="modal" data-bs-target="#m3">แชร์ความรู้</button></div>
    <div id="l3" class="container"></div>
</div>

<div id="p4" class="page">
    <div class="header-box bg-p4"><h4><i class="bi bi-briefcase"></i> จ้างงาน</h4></div>
    <div class="container mb-3"><button class="btn btn-success w-100 rounded-pill" data-bs-toggle="modal" data-bs-target="#m4">ประกาศงาน</button></div>
    <div id="l4" class="container"></div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn active" onclick="showP('p1', this)"><i class="bi bi-people-fill"></i>สังคม</button>
    <button class="nav-btn" onclick="showP('p2', this)"><i class="bi bi-bar-chart-fill"></i>อันดับ</button>
    <button class="nav-btn" onclick="showP('p3', this)"><i class="bi bi-book-fill"></i>ความรู้</button>
    <button class="nav-btn" onclick="showP('p4', this)"><i class="bi bi-chat-right-quote-fill"></i>จ้างงาน</button>
</nav>

<div class="modal fade" id="m1" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><iframe src="https://docs.google.com/forms/d/e/1FAIpQLScGfD3kDVJaCqZmvnTt6jpJMKY2xJrJU2WBuIOIt8WeiGPGww/viewform?embedded=true" width="100%" height="600"></iframe></div></div></div>
<div class="modal fade" id="m3" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdIFyA_JmeF20s3VX_qGIW6S1-g9RWHk_BLWCjfENwTeUzIeQ/viewform?embedded=true" width="100%" height="600"></iframe></div></div></div>
<div class="modal fade" id="m4" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeXTVXlbeamMIlFuidcG5d86Go40vXZu4fZX9QbbQmJBTmApw/viewform?embedded=true" width="100%" height="600"></iframe></div></div></div>

<script>
    const IDS = {
        S1: '15ajcag5w0OlLohaLHt7nY3NT3mkR_jDuc8hV3UKFeVY',
        S2: '1FZfgrRFicbs0XpRZZ0WBBSZ6dfWsPf1_IpYFht2e5KU',
        S3: '1ocXnPIi2fvjYxkO-GOVBZpm-RBg122_ywP_IJcv3Bi8',
        S4: '1xnYqk5zr4WInc2BKMfMhbTYd9GTEcgrjsAsMJeh30jg'
    };

    function getV(c) { return c ? (c.f ? c.f : String(c.v || "")) : ""; }
    
    function fixUrl(url) {
        if (!url || url.trim() === "") return "#";
        let l = url.trim();
        if (l.includes('drive.google.com')) {
            let id = l.split('id=')[1] || l.split('/d/')[1]?.split('/')[0];
            return `https://drive.google.com/uc?export=view&id=${id}`;
        }
        return l.startsWith('http') ? l : 'https://' + l;
    }

    async function pull(id) {
        try {
            const r = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&gid=0`);
            const t = await r.text();
            return JSON.parse(t.substring(47).slice(0, -2)).table.rows;
        } catch (e) { return []; }
    }

    async function load1() {
        const rows = await pull(IDS.S1);
        let h = '';
        rows.forEach(r => {
            let img = fixUrl(getV(r.c[5]));
            h += `<div class="card-custom" style="border-left: 5px solid var(--blue)">
                <span class="fw-bold text-primary">@${getV(r.c[2])}</span>
                <span class="t-desc">${getV(r.c[4])}</span>
                ${img !== "#" ? `<img src="${img}" class="img-preview" onerror="this.style.display='none'">` : ""}
            </div>`;
        });
        document.getElementById('l1').innerHTML = h;
    }

    async function load2() {
        const rows = await pull(IDS.S2);
        rows.sort((a,b) => (parseFloat(getV(b.c[4]))||0) - (parseFloat(getV(a.c[4]))||0));
        let h = '';
        rows.forEach((r, i) => {
            let link = fixUrl(getV(r.c[3]));
            h += `<div class="card-custom d-flex justify-content-between align-items-center">
                <div style="flex:1">
                    <div class="t-title">#${i+1} ${getV(r.c[1])}</div>
                    <span class="t-desc">${getV(r.c[2])}</span>
                    <a href="${link}" target="_blank" class="btn btn-sm btn-outline-primary mt-2 rounded-pill px-3">เปิดเว็บไซต์</a>
                </div>
                <div class="text-warning fw-bold"><i class="bi bi-star-fill"></i> ${getV(r.c[4])}</div>
            </div>`;
        });
        document.getElementById('l2').innerHTML = h;
    }

    async function load3() {
        const rows = await pull(IDS.S3);
        let h = '';
        rows.forEach(r => {
            h += `<div class="card-custom" style="border-left: 5px solid var(--gold)">
                <span class="t-title">${getV(r.c[1])}</span>
                <span class="t-desc">${getV(r.c[2])}</span>
                <div class="text-end mt-2" style="font-size:11px; color:#aaa;">โดย: ${getV(r.c[3])}</div>
            </div>`;
        });
        document.getElementById('l3').innerHTML = h;
    }

    async function load4() {
        const rows = await pull(IDS.S4);
        let h = '';
        rows.forEach(r => {
            let link = fixUrl(getV(r.c[6]));
            h += `<div class="card-custom" style="border-left: 5px solid var(--green)">
                <div class="d-flex justify-content-between"><span class="t-title text-success">${getV(r.c[3])}</span><b>${getV(r.c[5])}.-</b></div>
                <span class="t-desc mt-2">${getV(r.c[4])}</span>
                <div class="text-end mt-3"><a href="${link}" target="_blank" class="btn btn-success btn-sm rounded-pill px-4">ติดต่อผู้จ้าง</a></div>
            </div>`;
        });
        document.getElementById('l4').innerHTML = h;
    }

    function showP(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(id==='p1')load1(); if(id==='p2')load2(); if(id==='p3')load3(); if(id==='p4')load4();
    }
    window.onload = load1;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
